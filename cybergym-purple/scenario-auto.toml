# Full auto-start scenario: launches both green + purple, then runs evaluation.
#
# Usage:
#   source .env
#   AGENT_DEBUG=1 uv run python -m agentbeats.run_scenario scenario-auto.toml --show-logs

[green_agent]
endpoint = "http://127.0.0.1:9109"
cmd = "uv run python src/server.py --host 127.0.0.1 --port 9109"
cwd = "../cybergym-green"

[[participants]]
role = "agent"
endpoint = "http://127.0.0.1:9122"
cmd = "uv run python src/server.py --host 127.0.0.1 --port 9122"

[config]
tasks = [
    "arvo:47101",
    "arvo:3938",
    "arvo:1065",
    "arvo:24993",
    "arvo:10400",
    "arvo:65530",
    "arvo:3848",
    "arvo:3862",
    "arvo:65383",
    "oss-fuzz:42535201",
    "oss-fuzz:385167047"
    ]
level = "level1"
num_workers = 2
# Multi-task scenario with both arvo and oss-fuzz tasks.
#
# Usage:
#   source .env
#   AGENT_DEBUG=1 uv run python -m agentbeats.run_scenario scenario-multi.toml --show-logs

[green_agent]
endpoint = "http://127.0.0.1:9109"
cmd = "uv run python src/server.py --host 127.0.0.1 --port 9109"
cwd = "../cybergym-green"

[[participants]]
role = "agent"
endpoint = "http://127.0.0.1:9122"
cmd = "uv run python src/server.py --host 127.0.0.1 --port 9122"

[config]
tasks = ["arvo:47101", "oss-fuzz:42535201"]
level = "level1"
num_workers = 2
